name: e2e

# Playwright smoke tests against the production build. Reusable — called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    env:
      # Dummy Clerk keys so the app boots without real secrets (see
      # playwright.config.ts). Safe to expose — they reference no real tenant.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ZHVtbXlfc2VjcmV0X2tleV9mb3JfY2lfYnVpbGRzXw
      # Skip Clerk's dev-browser handshake (no live backend in CI). Inlined at
      # build time, so it must be set for both `build` and `start` below.
      NEXT_PUBLIC_E2E_BYPASS_CLERK: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
