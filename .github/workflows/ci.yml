name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job 1: unit — lint, typecheck, format, and Vitest unit tests with the
  # coverage gate (80% lines on components/, 90% on store/).
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run test:coverage

  # Job 2: storybook-test — runs every story's play function plus axe-core
  # accessibility checks in a real browser via the Storybook Vitest addon.
  storybook-test:
    name: storybook-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - run: npm run test:storybook

  # Job 3: e2e — Playwright smoke tests against the production build.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    env:
      # Dummy Clerk keys so the app boots without real secrets (see
      # playwright.config.ts). Safe to expose — they reference no real tenant.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: sk_test_ZHVtbXlfc2VjcmV0X2tleV9mb3JfY2lfYnVpbGRzXw
      # Skip Clerk's dev-browser handshake (no live backend in CI). Inlined at
      # build time, so it must be set for both `build` and `start` below.
      NEXT_PUBLIC_E2E_BYPASS_CLERK: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Visual regression baseline. The publish step is skipped (job stays green)
  # until the CHROMATIC_PROJECT_TOKEN repo secret is configured, so it never
  # blocks merges on a fresh repo. Once the token is set it captures baselines.
  chromatic:
    name: chromatic
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Publish to Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
      - name: Chromatic not configured
        if: ${{ env.CHROMATIC_PROJECT_TOKEN == '' }}
        run: echo "CHROMATIC_PROJECT_TOKEN not set — skipping visual baseline. Add the repo secret to enable."
