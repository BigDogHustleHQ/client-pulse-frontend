name: storybook-test

# Runs every story's play function plus axe-core accessibility checks in a real
# browser via the Storybook Vitest addon. Reusable — called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  storybook-test:
    name: storybook-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium chromium-headless-shell
      - run: npm run test:storybook
