name: unit

# Lint, typecheck, format, and Vitest unit tests with the coverage gate
# (80% lines on components/, 90% on store/). Reusable — called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm run test:coverage
